# Local infrastructure only — run backend and frontend natively.
# Set DATABASE_URL=postgres://proply:proply@localhost:5432/proply?sslmode=disable
# S3_ENDPOINT=http://localhost:9000, S3_ACCESS_KEY=minioadmin, S3_SECRET_KEY=minioadmin in backend/.env
# SMTP_HOST=localhost, SMTP_PORT=1025 in backend/.env; Mailpit UI at http://localhost:8025
services:
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - minio-data-local:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/proply-media &&
        mc anonymous set download local/proply-media
      "

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "1025:1025"
      - "8025:8025"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: proply
      POSTGRES_USER: proply
      POSTGRES_PASSWORD: proply
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U proply"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - pgdata-local:/var/lib/postgresql/data

  migrate:
    image: migrate/migrate
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/migrations:/migrations
    command:
      - "-path=/migrations"
      - "-database=postgres://proply:proply@postgres:5432/proply?sslmode=disable"
      - "up"

volumes:
  pgdata-local:
  minio-data-local:
