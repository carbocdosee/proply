# Local infrastructure only — run backend and frontend natively.
# Set DATABASE_URL=postgres://proply:proply@localhost:5432/proply?sslmode=disable
# in backend/.env when using this compose.
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: proply
      POSTGRES_USER: proply
      POSTGRES_PASSWORD: proply
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U proply"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - pgdata-local:/var/lib/postgresql/data

  migrate:
    image: migrate/migrate
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/migrations:/migrations
    command:
      - "-path=/migrations"
      - "-database=postgres://proply:proply@postgres:5432/proply?sslmode=disable"
      - "up"

volumes:
  pgdata-local:
