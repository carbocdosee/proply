# Production environment.
# Run with: docker compose -f docker-compose.prod.yml --env-file envs/prod/compose.env up -d
# Copy envs/prod/compose.env.example -> envs/prod/compose.env
# Copy envs/prod/backend.env.example -> envs/prod/backend.env  (and fill secrets)
# Copy envs/prod/frontend.env.example -> envs/prod/frontend.env (and fill values)
services:
  backend:
    image: ${BACKEND_IMAGE}
    env_file: ./envs/prod/backend.env
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    networks:
      - proply-prod
    restart: unless-stopped

  frontend:
    image: ${FRONTEND_IMAGE}
    env_file: ./envs/prod/frontend.env
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      - backend
    networks:
      - proply-prod
    restart: unless-stopped

networks:
  proply-prod:
