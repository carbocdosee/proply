# Test environment — all services in one Docker network.
# Run with: docker compose -f docker-compose.test.yml --env-file envs/test/compose.env up --build -d
services:
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - minio-data-test:/data
    networks:
      - proply-test

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/proply-media &&
        mc anonymous set download local/proply-media
      "
    networks:
      - proply-test

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - proply-test

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: proply
      POSTGRES_USER: proply
      POSTGRES_PASSWORD: proply
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U proply"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - pgdata-test:/var/lib/postgresql/data
    networks:
      - proply-test

  migrate:
    image: migrate/migrate
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/migrations:/migrations
    command:
      - "-path=/migrations"
      - "-database=postgres://proply:proply@postgres:5432/proply?sslmode=disable"
      - "up"
    networks:
      - proply-test

  backend:
    build:
      context: ./backend
    env_file: ./envs/test/backend.env
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    depends_on:
      migrate:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully
      mailpit:
        condition: service_started
    networks:
      - proply-test

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8080}
    env_file: ./envs/test/frontend.env
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      - backend
    networks:
      - proply-test

networks:
  proply-test:

volumes:
  pgdata-test:
  minio-data-test:
