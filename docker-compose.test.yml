# Test environment — all services in one Docker network.
# Run with: docker compose -f docker-compose.test.yml --env-file envs/test/compose.env up --build -d
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: proply
      POSTGRES_USER: proply
      POSTGRES_PASSWORD: proply
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U proply"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - pgdata-test:/var/lib/postgresql/data
    networks:
      - proply-test

  migrate:
    image: migrate/migrate
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/migrations:/migrations
    command:
      - "-path=/migrations"
      - "-database=postgres://proply:proply@postgres:5432/proply?sslmode=disable"
      - "up"
    networks:
      - proply-test

  backend:
    build:
      context: ./backend
    env_file: ./envs/test/backend.env
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    depends_on:
      migrate:
        condition: service_completed_successfully
    networks:
      - proply-test

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8080}
    env_file: ./envs/test/frontend.env
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      - backend
    networks:
      - proply-test

networks:
  proply-test:

volumes:
  pgdata-test:
